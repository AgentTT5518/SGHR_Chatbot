name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # --- Deploy ---
      # Add deploy secrets in GitHub: Settings -> Secrets and variables -> Actions
      # Replace this step with your own deploy target.
