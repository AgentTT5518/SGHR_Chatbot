name: CD

on:
  push:
    branches: [main]

jobs:
  # Check if frontend exists (package.json present)
  node_check:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.check.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: node_check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node
        if: needs.node_check.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        if: needs.node_check.outputs.has_node == 'true'
        working-directory: frontend
        run: |
          npm install
          npm run build

      # --- Deploy ---
      # Add deploy secrets in GitHub: Settings -> Secrets and variables -> Actions
      # Replace this step with your own deploy target.
      # - name: Deploy
      #   run: echo "Add your deployment step here"
